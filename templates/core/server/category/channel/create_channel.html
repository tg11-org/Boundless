{% extends 'base.html' %}
{% block title %}Create Channel - {{ server.name }} - Boundless{% endblock %}

{% block content %}
<div class="card" style="max-width: 480px; margin: 2rem auto;">
  <h2><i class="fas fa-plus"></i> Create Channel</h2>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="name">Channel Name</label>
      <input type="text" name="name" id="name" placeholder="general" required>
    </div>
    <div class="form-group">
      <label for="category_id">Category</label>
      <select name="category_id" id="category_id">
        {% for cat in categories %}
          <option value="{{ cat.id }}"
            {% if cat.id|stringformat:"s" == selected_category|stringformat:"s" %}selected{% endif %}
          >{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="channel_type">Channel Type</label>
      <select name="channel_type" id="channel_type" required>
        <option value="text">Text</option>
        <option value="voice">Voice</option>
        <option value="video">Video</option>
        <option value="media">Media</option>
        <option value="forum">Forum</option>
        <option value="announcement">Announcement</option>
        <option value="event">Event</option>
        <option value="support">Support</option>
        <option value="ticket">Ticket</option>
      </select>
    </div>
    <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
      <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Create</button>
      <a href="{% url 'core:server_detail' server_id=server.id %}" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
