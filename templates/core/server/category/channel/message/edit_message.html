{% extends 'base.html' %}
{% block title %}Edit Message - Boundless{% endblock %}

{% block content %}
<div class="card" style="max-width: 520px; margin: 2rem auto;">
  <h2><i class="fas fa-pen"></i> Edit Message</h2>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="content">Message</label>
      <textarea name="content" id="content" rows="4" style="width: 100%;">{{ message.content }}</textarea>
    </div>
    <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
      <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Save</button>
      <a href="{% url 'core:channel_detail' server_id=message.channel.server.id category_id=message.channel.category.id channel_id=message.channel.id %}" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
