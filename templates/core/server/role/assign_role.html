{% extends 'base.html' %}
{% block title %}Assign Role - {{ role.name }} - Boundless{% endblock %}

{% block content %}
<div class="card" style="max-width: 480px; margin: 2rem auto;">
  <h2><i class="fas fa-user-plus"></i> Assign Role: <span style="color: {{ role.color }};">{{ role.name }}</span></h2>
  <p class="text-muted">Server: {{ server.name }}</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="user_id">Select Member</label>
      <select name="user_id" id="user_id">
        {% for member in members %}
          <option value="{{ member.id }}">{{ member.display_name|default:member.username }} (@{{ member.username }})</option>
        {% endfor %}
      </select>
    </div>
    <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
      <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Assign</button>
      <a href="{% url 'core:roles_list' server_id=server.id %}" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
