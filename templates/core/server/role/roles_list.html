{% extends 'base.html' %}
{% block title %}Roles - {{ server.name }} - Boundless{% endblock %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 2rem auto;">
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
    <h2 style="margin: 0;"><i class="fas fa-shield-halved"></i> Roles &mdash; {{ server.name }}</h2>
    <a href="{% url 'core:create_role' server_id=server.id %}" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> New Role</a>
  </div>

  {% for role in roles %}
    <div style="display: flex; align-items: center; justify-content: space-between; padding: 0.65rem; background: var(--bg1); border-radius: var(--radius); margin-bottom: 0.4rem;">
      <span style="font-weight: 600; color: {{ role.color }};"><i class="fas fa-circle" style="font-size: 0.5rem; vertical-align: middle; margin-right: 0.4rem;"></i>{{ role.name }}</span>
      <div style="display: flex; gap: 0.3rem;">
        <a href="{% url 'core:edit_role' server_id=server.id role_id=role.id %}" class="btn btn-sm"><i class="fas fa-pen"></i></a>
        <a href="{% url 'core:assign_role' server_id=server.id role_id=role.id %}" class="btn btn-sm"><i class="fas fa-user-plus"></i></a>
      </div>
    </div>
  {% empty %}
    <p class="text-muted" style="text-align: center; padding: 1rem 0;">No roles created yet.</p>
  {% endfor %}

  <a href="{% url 'core:server_detail' server_id=server.id %}" class="btn" style="margin-top: 1rem;"><i class="fas fa-arrow-left"></i> Back to Server</a>
</div>
{% endblock %}
