{% extends 'base.html' %}
{% block title %}Forgot Password - Boundless{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 3rem auto; text-align: center;">
  <h2><i class="fas fa-key"></i> Forgot Your Password?</h2>
  <p class="text-muted" style="font-size: 0.9rem;">Enter your email and we'll send a reset link.</p>
  <form method="POST" style="text-align: left;">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_email">Email Address</label>
      {{ form.email }}
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
  </form>
  <p style="margin-top: 1rem; font-size: 0.85rem;"><a href="{% url 'login' %}"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
</div>
{% endblock %}
