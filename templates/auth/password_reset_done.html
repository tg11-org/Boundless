{% extends 'base.html' %}
{% block title %}Password Reset - Boundless{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 3rem auto; text-align: center;">
  <div style="font-size: 2.5rem; color: var(--success); margin-bottom: 0.75rem;"><i class="fas fa-circle-check"></i></div>
  <h2>Password Reset Successful</h2>
  <p class="text-muted">You can now log in with your new password.</p>
  <a href="{% url 'login' %}" class="btn btn-primary"><i class="fas fa-right-to-bracket"></i> Log In</a>
</div>
{% endblock %}
